services:
  - type: web
    name: bioguard-ai-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: FIREBASE_KEY_JSON
        sync: false
      - key: FIREBASE_DB_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.21